name: Docs Governance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"
  push:
    paths:
      - "docs/**"
      - "research/**"
      - "scripts/docs_governance.py"
      - "src/wouldtheyhavemet/doc_governance.py"
      - ".github/workflows/docs-governance.yml"

jobs:
  refresh-docs-audit:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs governance dependencies
        run: pip install pyyaml

      - name: Refresh docs audit artifacts
        run: python scripts/docs_governance.py sync

      - name: Commit generated audit files
        run: |
          if git diff --quiet -- docs/audit-log.md docs/review-queue.md docs/.doc-governance-state.json; then
            echo "No generated docs changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/audit-log.md docs/review-queue.md docs/.doc-governance-state.json
          git commit -m "chore: refresh docs governance artifacts [skip ci]"
          git push
